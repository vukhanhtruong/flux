name: Release to Docker Hub

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

env:
  DOCKERHUB_REPO: ${{ vars.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_REPO || 'flux' }}

permissions:
  contents: read

jobs:
  test-python:
    name: Test ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: core
            install: "'./packages/core[dev,vector,embeddings,backup]'"
            cov_source: flux_core
          - package: api-server
            install: "'./packages/core[vector,embeddings,backup]' './packages/api-server[dev]'"
            cov_source: flux_api
          - package: mcp-server
            install: "'./packages/core[vector,embeddings]' './packages/mcp-server[dev]'"
            cov_source: flux_mcp
          - package: agent-bot
            install: "'./packages/core' './packages/mcp-server' './packages/agent-bot[dev]'"
            cov_source: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/*/pyproject.toml

      - name: Install packages
        run: |
          pip install --upgrade pip
          pip install ${{ matrix.install }}

      - name: Run tests with coverage
        env:
          DATABASE_PATH: /tmp/flux-test/flux.db
          ZVEC_PATH: /tmp/flux-test/zvec
        working-directory: packages/${{ matrix.package }}
        run: |
          mkdir -p /tmp/flux-test/sqlite /tmp/flux-test/zvec
          pytest tests/ -v --tb=short \
            --cov=${{ matrix.cov_source }} --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=90

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.package }}
          path: packages/${{ matrix.package }}/coverage.xml
          retention-days: 30

  test-web-ui:
    name: Test web-ui
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/web-ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: packages/web-ui

      - name: Run web-ui tests
        run: npm run test -- --coverage
        working-directory: packages/web-ui

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Scan Python dependencies for known vulnerabilities
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/*/pyproject.toml

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        run: |
          pip install \
            -e "./packages/core[vector,embeddings,backup]" \
            -e "./packages/api-server" \
            -e "./packages/mcp-server" \
            -e "./packages/agent-bot"
          pip-audit --desc --skip-editable \
            --ignore-vuln CVE-2026-25990  # pillow <12; blocked by fastembed pinning pillow<12.0

      # Scan Dockerfile and filesystem for misconfigurations
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

  build-and-push:
    name: Build & Push Docker Image
    needs: [test-python, test-web-ui, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_REPO }}
          tags: |
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=sha,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_BASE_URL=/api
