services:
  adminer:
    extends:
      file: docker-compose.yml
      service: adminer

  postgres:
    extends:
      file: docker-compose.yml
      service: postgres

  api-server:
    extends:
      file: docker-compose.yml
      service: api-server
    command:
      [
        "uvicorn",
        "flux_api.app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "/app/core/src",
        "--reload-dir",
        "/app/api/src",
      ]
    volumes:
      - ./packages/core/src:/app/core/src
      - ./packages/api-server/src:/app/api/src
      - huggingface_cache:/root/.cache/huggingface
    develop:
      watch:
        - action: sync
          path: ./packages/core/src
          target: /app/core/src
        - action: sync
          path: ./packages/api-server/src
          target: /app/api/src
        - action: rebuild
          path: ./packages/core/pyproject.toml
        - action: rebuild
          path: ./packages/api-server/pyproject.toml

  mcp-server:
    extends:
      file: docker-compose.yml
      service: mcp-server
    command:
      [
        "sh",
        "-c",
        "watchfiles --filter python --ignore-paths /root/.cache \"python -m flux_mcp.server\" /app/core/src /app/mcp/src",
      ]
    volumes:
      - ./packages/core/src:/app/core/src
      - ./packages/mcp-server/src:/app/mcp/src
      - huggingface_cache:/root/.cache/huggingface
    develop:
      watch:
        - action: sync
          path: ./packages/core/src
          target: /app/core/src
        - action: sync
          path: ./packages/mcp-server/src
          target: /app/mcp/src
        - action: rebuild
          path: ./packages/core/pyproject.toml
        - action: rebuild
          path: ./packages/mcp-server/pyproject.toml

  web-ui:
    extends:
      file: docker-compose.yml
      service: web-ui
    command:
      [
        "sh",
        "-c",
        "npm install && npm run dev -- --host 0.0.0.0 --port 5173",
      ]
    environment:
      VITE_API_BASE_URL: http://localhost:${API_PORT:-8000}
      VITE_USER_ID: ${VITE_USER_ID:-demo-user}
    volumes:
      - ./packages/web-ui:/app
      - web_ui_node_modules:/app/node_modules
    develop:
      watch:
        - action: sync
          path: ./packages/web-ui/src
          target: /app/src
        - action: sync
          path: ./packages/web-ui/public
          target: /app/public
        - action: rebuild
          path: ./packages/web-ui/package.json
        - action: rebuild
          path: ./packages/web-ui/package-lock.json
        - action: sync+restart
          path: ./packages/web-ui/vite.config.ts
          target: /app/vite.config.ts

  agent-bot:
    extends:
      file: docker-compose.yml
      service: agent-bot
    command:
      [
        "sh",
        "-c",
        "watchfiles --filter python --ignore-paths /home/bot/.claude --ignore-paths /tmp/flux-images \"python -m flux_bot.main\" /app/core/src /app/mcp-server/src /app/bot/src",
      ]
    volumes:
      - ./packages/core/src:/app/core/src
      - ./packages/mcp-server/src:/app/mcp-server/src
      - ./packages/agent-bot/src:/app/bot/src
      - ./packages/agent-bot/migrations:/app/bot/migrations
      - agent_sessions:/home/bot/.claude
      - agent_images:/tmp/flux-images
    develop:
      watch:
        - action: sync
          path: ./packages/core/src
          target: /app/core/src
        - action: sync
          path: ./packages/mcp-server/src
          target: /app/mcp-server/src
        - action: sync
          path: ./packages/agent-bot/src
          target: /app/bot/src
        - action: rebuild
          path: ./packages/core/pyproject.toml
        - action: rebuild
          path: ./packages/mcp-server/pyproject.toml
        - action: rebuild
          path: ./packages/agent-bot/pyproject.toml

volumes:
  postgres_data:
  agent_sessions:
  agent_images:
  whatsapp_auth:
  huggingface_cache:
  web_ui_node_modules:
