# docker-compose.yml — Single-container FluxFinance (SQLite+zvec)
#
# Usage:
#   docker compose up --build             # Build and run
#   docker compose up -d                  # Detached
#   docker compose down                   # Stop
#
# Environment variables (set in .env or export):
#   TELEGRAM_BOT_TOKEN   — enables agent bot
#   CLAUDE_AUTH_TOKEN     — required for agent bot
#   VITE_USER_ID is derived from TELEGRAM_ALLOW_FROM (tg:<id>)

services:
  flux:
    env_file:
      - path: .env
        required: false
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_USER_ID: tg:${TELEGRAM_ALLOW_FROM:-demo-user}
    container_name: flux
    ports:
      - "${PORT:-5173}:80"
    environment:
      DATABASE_PATH: /data/sqlite/flux.db
      ZVEC_PATH: /data/zvec
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOW_FROM: ${TELEGRAM_ALLOW_FROM:-}
      CLAUDE_AUTH_TOKEN: ${CLAUDE_AUTH_TOKEN:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-}
      CLAUDE_TIMEOUT: ${CLAUDE_TIMEOUT:-300}
      MCP_CONFIG_PATH: /app/mcp-config.json
      BACKUP_LOCAL_DIR: /data/backups
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
      NGROK_TUNNEL_PORT: 80
    volumes:
      - flux_data:/data
    restart: unless-stopped

volumes:
  flux_data:
