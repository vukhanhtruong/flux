# docker-compose.yml — Single-container FluxFinance (SQLite+zvec)
#
# Usage:
#   docker compose up --build             # Build and run
#   docker compose up -d                  # Detached
#   docker compose down                   # Stop
#
# Environment variables (set in .env or export):
#   TELEGRAM_BOT_TOKEN   — enables agent bot
#   CLAUDE_AUTH_TOKEN     — required for agent bot
#   VITE_USER_ID          — web UI user ID (default: demo-user)

services:
  flux:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_USER_ID: ${VITE_USER_ID:-demo-user}
    container_name: flux
    ports:
      - "${PORT:-80}:80"
    environment:
      DATABASE_PATH: /data/sqlite/flux.db
      ZVEC_PATH: /data/zvec
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOW_FROM: ${TELEGRAM_ALLOW_FROM:-}
      CLAUDE_AUTH_TOKEN: ${CLAUDE_AUTH_TOKEN:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-}
      CLAUDE_TIMEOUT: ${CLAUDE_TIMEOUT:-300}
    volumes:
      - flux_data:/data
    restart: unless-stopped

volumes:
  flux_data:
