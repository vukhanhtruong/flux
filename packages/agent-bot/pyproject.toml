[project]
name = "flux-bot"
version = "0.2.0"
description = "flux Agent Bot — NanoClaw-style orchestrator with Claude Agent SDK"
requires-python = ">=3.12"
dependencies = [
    "flux-core",
    "flux-mcp",
    "python-telegram-bot[job-queue]>=21.0",
    "claude-agent-sdk",
    "telegramify-markdown>=0.5.4",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/flux_bot"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src"]

[tool.coverage.run]
omit = ["src/flux_bot/main.py"]

[tool.ruff]
line-length = 100
