[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "flux-api"
version = "0.1.0"
description = "flux REST API Server — FastAPI interface over core"
requires-python = ">=3.12"
dependencies = [
    "flux-core[backup]",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",  # For testing FastAPI
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/flux_api"]

[tool.ruff]
line-length = 100
