[project]
name = "flux-core"
version = "0.1.0"
description = "flux shared business logic — models, repos, embeddings, migrations"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "croniter>=3.0",
]

[project.optional-dependencies]
vector = [
    "zvec>=0.2.1b0",
]
embeddings = [
    "fastembed>=0.4",
]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-benchmark>=4.0",
    "ruff>=0.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/flux_core"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
