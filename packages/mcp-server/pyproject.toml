[project]
name = "flux-mcp"
version = "0.1.0"
description = "flux MCP Server — thin MCP interface over core"
requires-python = ">=3.12"
dependencies = [
    "flux-core",
    "fastmcp>=3.0.0rc1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "ruff>=0.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/flux_mcp"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
